databaseChangeLog:
  - changeSet:
      id: common-employee-sample
      author: Akash
      context: common
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: EMPLOYEE
      changes:
        - loadData:
            file: db/changelog/data/common/employees.csv
            tableName: EMPLOYEE
            separator: ','
            quotchar: '"'
            encoding: UTF-8
      rollback:
        - delete:
            tableName: EMPLOYEE

  - changeSet:
      id: common-accounts-sample
      author: Akash
      context: common
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: ACCOUNTS
      changes:
        - loadData:
            file: db/changelog/data/common/accounts.csv
            tableName: ACCOUNTS
            separator: ','
            quotchar: '"'
            encoding: UTF-8
      rollback:
        - delete:
            tableName: ACCOUNTS
