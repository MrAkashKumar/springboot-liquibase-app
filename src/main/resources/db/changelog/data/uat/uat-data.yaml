databaseChangeLog:
  - changeSet:
      id: uat-test-accounts
      author: Akash
      context: uat
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: ACCOUNTS
      changes:
        - loadData:
            file: db/changelog/data/uat/test-users.csv
            tableName: ACCOUNTS
            separator: ','
            quotchar: '"'
            encoding: UTF-8
      rollback:
        - delete:
            tableName: ACCOUNTS